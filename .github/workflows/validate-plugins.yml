name: Validate plugins

# Validates the marketplace catalog and every plugin manifest (plus skill/agent/
# hook frontmatter) with the Claude Code CLI. Runs in --strict mode so that
# unrecognized fields and missing metadata fail the build.

on:
  push:
    branches: [main]
    paths:
      - ".claude-plugin/**"
      - "skills/**"
      - "agents/**"
      - "hooks/**"
      - "scripts/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/validate-plugins.yml"
  pull_request:
    paths:
      - ".claude-plugin/**"
      - "skills/**"
      - "agents/**"
      - "hooks/**"
      - "scripts/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/validate-plugins.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Keep CI runs offline-friendly: no auto-update or telemetry traffic.
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace and plugin
        run: claude plugin validate . --strict

  test-installer:
    # End-to-end test of the vendored install path used for Claude Code web:
    # install twice (idempotence), assert the vendored result, then uninstall.
    # Also checks docs consistency: every skill/agent documented in README and
    # the /flywheel:help command map.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Test install-vendored.sh
        run: bash scripts/test-install-vendored.sh

      - name: Check docs consistency
        run: bash scripts/test-docs-consistency.sh
