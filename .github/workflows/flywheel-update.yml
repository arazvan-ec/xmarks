name: flywheel update (reusable)

# Reusable workflow for repos that carry a VENDORED flywheel copy (installed
# with scripts/install-vendored.sh). The caller — written into target repos by
# `install-vendored.sh --auto-update` — runs this weekly: it compares the
# repo's .claude/flywheel/VERSION against the latest version on this repo's
# main, and when they differ re-runs the installer and opens a PR with the
# refreshed copy. No new version → no PR, so there is no weekly noise.
#
# Caller repos must allow GitHub Actions to create pull requests
# (Settings → Actions → General → "Allow GitHub Actions to create and
# approve pull requests").

on:
  workflow_call: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest flywheel
        run: git clone --depth 1 https://github.com/arazvan-ec/xmarks "$RUNNER_TEMP/xmarks"

      - name: Compare versions
        id: check
        run: |
          LOCAL="$(sed -n 's/^flywheel //p' .claude/flywheel/VERSION 2>/dev/null | head -1)"
          REMOTE="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["version"])' \
            "$RUNNER_TEMP/xmarks/.claude-plugin/plugin.json")"
          echo "local=${LOCAL:-none}" >> "$GITHUB_OUTPUT"
          echo "remote=${REMOTE}" >> "$GITHUB_OUTPUT"
          if [ "${LOCAL}" = "${REMOTE}" ]; then
            echo "needs=false" >> "$GITHUB_OUTPUT"
            echo "already on flywheel ${REMOTE} — nothing to do"
          else
            echo "needs=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh vendored copy
        if: steps.check.outputs.needs == 'true'
        run: bash "$RUNNER_TEMP/xmarks/scripts/install-vendored.sh" "$GITHUB_WORKSPACE"

      - name: Build PR body with upgrade notes
        if: steps.check.outputs.needs == 'true'
        run: |
          LOCAL="${{ steps.check.outputs.local }}"
          REMOTE="${{ steps.check.outputs.remote }}"
          {
            echo "Automated refresh of the vendored flywheel copy from"
            echo "[arazvan-ec/xmarks](https://github.com/arazvan-ec/xmarks) \`main\`:"
            echo "\`${LOCAL}\` → \`${REMOTE}\`."
            echo ""
            ACTION=false
            for f in $(ls "$RUNNER_TEMP"/xmarks/upgrades/v*.md 2>/dev/null | sort -V); do
              v="$(basename "$f" .md)"; v="${v#v}"
              # keep notes in the range (LOCAL, REMOTE]
              if [ "${LOCAL}" != "none" ]; then
                [ "$v" != "${LOCAL}" ] || continue
                [ "$(printf '%s\n%s\n' "${LOCAL}" "$v" | sort -V | head -1)" = "${LOCAL}" ] || continue
              fi
              [ "$(printf '%s\n%s\n' "$v" "${REMOTE}" | sort -V | head -1)" = "$v" ] || continue
              echo "### Upgrade note v${v}"
              echo ""
              cat "$f"
              echo ""
              grep -q '^requires-action: true$' "$f" && ACTION=true
            done
            if [ "${ACTION}" = true ]; then
              echo "> ⚠️ At least one note above **requires action** beyond this file refresh."
              echo "> Open a Claude Code session on this branch and run \`/flywheel-update\` —"
              echo "> it executes the strategies and logs them to \`.claude/flywheel/UPGRADES.md\`."
            fi
            echo ""
            echo "Review the \`.claude/\` diff — any \`*.pre-flywheel\` backups in it mean"
            echo "local edits were overwritten by the refresh."
          } > "$RUNNER_TEMP/pr-body.md"

      - name: Open update PR
        if: steps.check.outputs.needs == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            .claude/
          branch: flywheel/update
          delete-branch: true
          commit-message: "Update vendored flywheel to ${{ steps.check.outputs.remote }}"
          title: "Update vendored flywheel to ${{ steps.check.outputs.remote }}"
          body-path: ${{ runner.temp }}/pr-body.md
